<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 320px; padding: 15px; font-family: 'Segoe UI', sans-serif; background: #fff; }
    .button-group { display: flex; gap: 10px; margin-bottom: 15px; }
    button { flex: 1; padding: 10px; font-weight: 600; cursor: pointer; border: none; border-radius: 6px; }
    #summarize-btn { background: #4f46e5; color: white; }
    #copy-btn { background: #10b981; color: white; }
    button:disabled { background: #d1d5db !important; color: #9ca3af; cursor: not-allowed; }
    #output { min-height: 100px; max-height: 300px; overflow-y: auto; padding: 10px; background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
    .settings-link { display: block; margin-top: 15px; text-align: center; font-size: 12px; color: #4f46e5; text-decoration: none; }
  </style>
</head>
<body>
  <h2>AI Summarizer</h2>
  <div class="button-group">
    <button id="summarize-btn">Summarize</button>
    <button id="copy-btn" disabled>Copy</button>
  </div>
  <div id="output">Ready to summarize...</div>
  <a href="#" id="open-options" class="settings-link">Settings (Enter API Key)</a>
  <script src="popup.js"></script>
</body>
</html>
