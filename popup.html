<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { 
      width: 350px; 
      padding: 15px; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      background-color: #ffffff;
      margin: 0;
    }
    .header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      margin-bottom: 15px; 
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
    }
    .header strong {
      color: #1e1b4b;
      font-size: 16px;
    }
    button { 
      padding: 10px 12px; 
      border-radius: 6px; 
      border: none; 
      cursor: pointer; 
      font-weight: 600; 
      transition: background 0.2s;
    }
    #summarize-btn { 
      background: #4f46e5; 
      color: white; 
      width: 100%; 
      margin-bottom: 10px; 
      font-size: 14px;
    }
    #summarize-btn:hover { background: #4338ca; }
    #summarize-btn:disabled { background: #9ca3af; cursor: not-allowed; }

    #output { 
      font-size: 14px; 
      line-height: 1.6; 
      color: #374151; 
      background: #f3f4f6; 
      padding: 12px; 
      border-radius: 6px; 
      min-height: 120px; 
      max-height: 300px;
      overflow-y: auto;
      white-space: pre-wrap; 
      border: 1px solid #e5e7eb;
    }
    .controls { 
      display: flex; 
      gap: 10px; 
      margin-top: 12px; 
    }
    .secondary-btn { 
      background: #e5e7eb; 
      color: #374151; 
      flex: 1; 
      font-size: 13px; 
    }
    .secondary-btn:hover { background: #d1d5db; }
    .secondary-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    
    /* The gear icon button */
    #open-options { 
      background: transparent; 
      font-size: 18px; 
      padding: 5px;
      color: #6b7280;
    }
    #open-options:hover { color: #111827; }
  </style>
</head>
<body>
  <div class="header">
    <strong>AI Web Summarizer</strong>
    <button id="open-options" title="Settings">&#9881;</button>
  </div>

  <button id="summarize-btn">Summarize Page</button>
  
  <div id="output">Results will appear here...</div>

  <div class="controls">
    <button id="copy-btn" class="secondary-btn" disabled>Copy Summary</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
