<!DOCTYPE html>
<html>
<head>
  <style>
    body { padding: 25px; font-family: 'Segoe UI', sans-serif; width: 350px; background: #fdfdfd; }
    h2 { color: #1e1b4b; margin-top: 0; }
    .field { margin-bottom: 15px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #4b5563; }
    select, input { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
    button:hover { background: #4338ca; }
    #status { margin-top: 10px; color: #059669; font-size: 13px; text-align: center; font-weight: 500; }
  </style>
</head>
<body>
  <h2>AI Settings</h2>
  
  <div class="field">
    <label>Provider</label>
    <select id="provider-select">
      <option value="groq">Groq (Fastest)</option>
      <option value="openai">OpenAI (GPT Models)</option>
      <option value="gemini">Google Gemini</option>
    </select>
  </div>

  <div class="field">
    <label>Model ID</label>
    <input type="text" id="model-id" placeholder="e.g. gpt-4o or gemini-1.5-flash">
  </div>

  <div class="field">
    <label>API Key</label>
    <input type="password" id="api-key" placeholder="Paste your key here">
  </div>

  <button id="save-btn">Save Configuration</button>
  <div id="status"></div>

  <p style="font-size: 11px; color: #9ca3af; margin-top: 15px;">
    Note: Ensure your Model ID matches your Provider's official names.
  </p>

  <script src="options.js"></script>
</body>
</html>
